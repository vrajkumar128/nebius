<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GitHub Summarizer</title>
    </head>
    <body style="margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; justify-content: center">
        <div align="center">
            <h1>Summarize a Repository</h1>
            <input id="url" placeholder="GitHub URL">
            <br />
            <br />
            <button onclick="summarize()">Summarize</button>
            <div>
                <p id="summary"></p>
                <p id="technologies"></p>
                <p id="structure"></p>
            </div>
        </div>
    
        <script>
        async function summarize() {
            const url = document.getElementById('url').value;
            const summaryP = document.getElementById('summary');
            const technologiesP = document.getElementById('technologies');
            const structureP = document.getElementById('structure');

            summaryP.textContent = "Summarizing...";
            technologiesP.textContent = "";
            structureP.textContent = "";
            
            const response = await fetch('/summarize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ github_url: url })
            });
            
            const { summary, technologies, structure } = await response.json();
            summaryP.textContent = `Summary: ${summary}`;
            technologiesP.textContent = `Technologies: ${technologies.join(", ")}`;
            structureP.textContent = `Structure: ${structure}`;
        }
        </script>
    </body>
</html>
